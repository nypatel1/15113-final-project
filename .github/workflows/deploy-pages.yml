name: Deploy Posture Coach to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required permissions for the official Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; cancel older runs if a newer push comes in.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: posture-coach
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: posture-coach/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        env:
          # Serves at https://<user>.github.io/<repo>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: SPA fallback (copy index.html -> 404.html)
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll on Pages
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: posture-coach/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
